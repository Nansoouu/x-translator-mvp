# CI/CD Pipeline for x-translator-mvp
# Runs on every push to main branch

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
      
      - name: Run backend linting
        working-directory: backend
        run: |
          pip install flake8 black
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check .
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Run frontend linting
        working-directory: frontend
        run: npm run lint
      
      - name: Run frontend type checking
        working-directory: frontend
        run: npm run build
      
      - name: Run tests (if available)
        working-directory: backend
        run: |
          if [ -f "tests/test_*.py" ]; then
            pip install pytest pytest-asyncio
            pytest tests/ -v
          else
            echo "No tests found"
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run security scan
        uses: lukechilds/security-baseline-action@v1
        with:
          command: 'git clone --recursive https://github.com/Nansoouu/x-translator-mvp.git'
          path: 'x-translator-mvp'
          exclude: 'x-translator-mvp/.git,x-translator-mvp/node_modules,x-translator-mvp/.next,x-translator-mvp/__pycache__'